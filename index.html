<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="login-container">
        <div class="login-box">
            <div class="login-logo-wrapper">
                <img src="logo1.png" alt="StreamHub Logo" width="128" height="128" class="login-logo-img">
            </div>
            <h2><i class="fas fa-play-circle"></i> StreamHub Login</h2>
            <form id="login-form" onsubmit="return false;">
                <div class="input-group">
                    <label for="login-user">Usuário</label>
                    <input type="text" id="login-user" placeholder="Digite o usuário">
                </div>
                <div class="input-group">
                    <label for="login-pass">Senha</label>
                    <input type="password" id="login-pass" placeholder="Digite a senha">
                </div>
                <button type="button" id="btn-login" class="btn-primary">Entrar</button>
            </form>
        </div>
    </div>

    <div id="app-container" class="main-wrapper hidden">
        
        <header class="app-header">
            <div class="header-left">
                <button id="toggle-sidebar" class="btn-icon" title="Menu"><i class="fas fa-bars"></i></button>
                <h1 id="bc-root" class="brand-title"><i class="fas fa-play-circle"></i> StreamHub</h1>
                <button id="btn-toggle-search-mobile" class="btn-icon btn-mobile-only" title="Buscar"><i class="fas fa-search"></i></button>
            </div>
            
            <div class="header-center">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-yt-input" placeholder="Buscar vídeos globais no YouTube...">
                </div>
            </div>
            
            <div class="header-right">
                <button id="btn-open-admin" class="btn-admin" title="Painel de Controle"><i class="fas fa-cog"></i> Admin</button>
                <button id="btn-logout" class="btn-logout" title="Sair"><i class="fas fa-sign-out-alt"></i> Sair</button>
            </div>
        </header>

        <div id="mobile-search-row" class="mobile-search-container hidden">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="search-yt-input-mobile" placeholder="Buscar vídeos no YouTube...">
            </div>
        </div>

        <div class="content-body">
            <aside id="sidebar" class="sidebar-panel">
                <div class="sidebar-search">
                    <input type="text" id="search-internal-input" placeholder="Filtrar categorias/mídias...">
                </div>
                <ul id="sidebar-tree" class="tree-root">
                    </ul>
            </aside>

            <main class="mosaic-container">
                <div class="breadcrumb-bar">
                    <span class="bc-item" id="bc-home"><i class="fas fa-home"></i> Início</span>
                    <span class="bc-item hidden" id="bc-category"><i class="fas fa-chevron-right"></i> <span class="txt"></span></span>
                    <span class="bc-item hidden" id="bc-subcategory"><i class="fas fa-chevron-right"></i> <span class="txt"></span></span>
                    <span class="bc-item hidden" id="bc-search"><i class="fas fa-chevron-right"></i> Resultados da Busca</span>
                </div>

                <div id="mosaic-grid" class="mosaic-grid">
                    </div>
            </main>
        </div>

        <div id="player-container" class="floating-player hidden">
            <div class="player-header">
                <h3 id="current-track-title">Reproduzindo mídia...</h3>
                <button id="btn-close-player" class="btn-icon-close"><i class="fas fa-times"></i></button>
            </div>
            <div class="player-content">
                <div id="yt-player" class="hidden"></div>
                <iframe id="universal-player" class="hidden" allowfullscreen></iframe>
                <video id="raw-player" controls class="hidden"></video>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="modal-overlay hidden">
        <div class="modal-box admin-box">
            <div class="modal-header">
                <h2><i class="fas fa-sliders"></i> Painel Gerencial</h2>
                <button id="btn-close-admin" class="btn-close">&times;</button>
            </div>
            
            <div class="tab-nav">
                <button id="tab-trigger-add" class="tab-btn active"><i class="fas fa-plus-circle"></i> Adicionar Mídia</button>
                <button id="tab-trigger-manage" class="tab-btn"><i class="fas fa-folder-open"></i> Organizar Bloco (CRUD)</button>
                <button id="tab-trigger-channel" class="tab-btn"><i class="fas fa-tv"></i> Vincular Canal YT</button>
            </div>

            <div class="modal-body">
                <div id="add-tab" class="tab-content">
                    <div class="form-row-inline">
                        <input type="text" id="manual-media-url" placeholder="Cole a URL do vídeo do YouTube, Playlist, MP4 ou Embed">
                        <button id="btn-fetch-manual" class="btn-secundary">Capturar Dados</button>
                    </div>
                    <div class="preview-card-box">
                        <img id="prev-thumb" src="https://placehold.co/120x90?text=Sem+Capa" alt="Capa">
                        <div class="preview-fields">
                            <input type="text" id="prev-title" placeholder="Título capturado ou da playlist">
                            <div class="inline-inputs">
                                <input type="text" id="media-category" placeholder="Nome da Categoria">
                                <input type="text" id="media-subcategory" placeholder="Nome da Subcategoria">
                            </div>
                        </div>
                    </div>
                    <button id="btn-save-media" class="btn-success-block"><i class="fas fa-cloud-upload-alt"></i> Salvar no meu Firebase</button>
                </div>

                <div id="manage-tab" class="tab-content hidden">
                    <div class="split-manage-layout">
                        <div class="tree-panel-crud">
                            <h3>Sua Estrutura de Diretórios</h3>
                            <div id="crud-tree-list" class="crud-tree-list"></div>
                        </div>
                        
                        <div class="json-tools-panel">
                            <div class="action-card-json theme-picker-box">
                                <label><i class="fas fa-palette"></i> Cor do Tema do Usuário</label>
                                <p style="font-size: 0.75rem; color: #a8a8b3; margin-bottom: 5px;">Arraste o marcador para definir a sua cor exclusiva:</p>
                                <div class="color-spectrum-wrapper">
                                    <div id="color-spectrum-bar" class="color-spectrum-bar">
                                        <div id="color-spectrum-selector" class="color-spectrum-selector">
                                            <i class="fas fa-caret-down cursor-seta-top"></i>
                                            <i class="fas fa-caret-up cursor-seta-bottom"></i>
                                        </div>
                                    </div>
                                </div>
                                <div class="theme-preview-row">
                                    <span id="theme-color-hex">#3498db</span>
                                    <button id="btn-reset-theme" style="padding: 4px 8px; font-size: 0.75rem; background: #333; color: #fff;">Cor Padrão</button>
                                </div>
                            </div>

                            <h3><i class="fas fa-database"></i> Cópias de Segurança</h3>
                            <div class="action-card-json">
                                <label>Exportar Backup Integral</label>
                                <button id="btn-export-all-json" class="btn-export"><i class="fas fa-download"></i> Exportar Tudo (.json)</button>
                            </div>
                            <div class="action-card-json">
                                <label>Importar Arquivo de Backup (.json)</label>
                                <input type="file" id="file-import-json" accept=".json">
                            </div>
                            <div class="action-card-json">
                                <label>Importar via Código Texto JSON</label>
                                <textarea id="json-input-field" placeholder="Cole o código estruturado aqui..."></textarea>
                                <button id="btn-submit-json-code" class="btn-import-code"><i class="fas fa-file-import"></i> Injetar Código</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="channel-tab" class="tab-content hidden">
                    <div class="form-row-inline">
                        <input type="text" id="search-channel-input" placeholder="Pesquise o nome do canal do YouTube...">
                        <button id="btn-search-channel" class="btn-primary">Buscar Canal</button>
                    </div>
                    <div id="channel-preview" class="channel-preview-box" style="display: none;">
                        <img id="chan-thumb" src="" alt="Canal">
                        <div class="chan-info">
                            <h4 id="chan-title-text"></h4>
                            <p id="chan-desc-text"></p>
                        </div>
                    </div>
                    <div class="form-group-select">
                        <label for="channel-target-category">Vincular na Categoria:</label>
                        <select id="channel-target-category"></select>
                    </div>
                    <button id="btn-save-channel-link" class="btn-success-block"><i class="fas fa-link"></i> Salvar Vínculo Dinâmico</button>
                </div>
            </div>
        </div>
    </div>

    <div id="edit-media-modal" class="modal-overlay hidden">
        <div class="modal-box edit-box">
            <div class="modal-header">
                <h3>Editar Dados da Mídia</h3>
            </div>
            <div class="modal-body font-inputs">
                <div class="input-block">
                    <label>Título da Mídia</label>
                    <input type="text" id="edit-field-title">
                </div>
                <div class="input-block">
                    <label>URL / Link do Conteúdo</label>
                    <input type="text" id="edit-field-link">
                </div>
                <div class="input-block">
                    <label>URL da Imagem de Capa</label>
                    <input type="text" id="edit-field-capa">
                </div>
                <div class="input-block">
                    <label>Categoria</label>
                    <input type="text" id="edit-field-category">
                </div>
                <div class="input-block">
                    <label>Subcategoria</label>
                    <input type="text" id="edit-field-subcategory">
                </div>
            </div>
            <div class="modal-footer-btns">
                <button id="btn-cancel-edit-media" class="btn-default">Cancelar</button>
                <button id="btn-submit-edit-media" class="btn-success">Salvar Alterações</button>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="app.js"></script>
</body>
</html>
