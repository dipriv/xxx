<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Prive</title></title>
    
    <link rel="icon" type="image/x-icon" href="fav.ico">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="login-screen" class="modal-overlay">
        <div class="login-box">
            <img src="logo1.png" alt="Logotipo StreamHub" class="login-logo">
            <h2><i class="fab fa-youtube text-red"></i> Hot Prive</h2>
            <input type="text" id="login-user" placeholder="Digite seu usuário">
            <input type="password" id="login-pass" placeholder="Digite sua senha">
            <button id="btn-login">Entrar</button>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <header class="main-header">
            <div class="header-left">
                <button id="toggle-sidebar" class="icon-btn"><i class="fas fa-bars"></i></button>
                <div class="logo">Hot<span>Prive</span></div>
            </div>
            
            <div class="search-container">
                <i class="fab fa-youtube search-icon text-red"></i>
                <input type="text" id="search-yt-input" placeholder="Pesquisar mídias ou playlists direto no YouTube...">
            </div>

            <div class="header-actions">
                <button id="btn-open-admin" class="admin-btn"><i class="fas fa-cog"></i> Gerenciar</button>
                <button id="btn-logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Sair</button>
            </div>
        </header>

        <div class="wrapper">
            <nav id="sidebar" class="sidebar">
                <div class="internal-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-internal-input" placeholder="Filtrar categorias ou mídias...">
                </div>
                <h3>Categorias</h3>
                <ul id="sidebar-tree" class="tree-menu">
                    </ul>
            </nav>

            <main class="main-content">
                <div class="breadcrumb">
                    <span id="bc-root" class="clickable">Início</span>
                    <span id="bc-category" class="hidden"> > <span class="txt"></span></span>
                    <span id="bc-subcategory" class="hidden"> > <span class="txt"></span></span>
                    <span id="bc-search" class="hidden"> > <span class="txt">Resultados do YouTube</span></span>
                </div>

                <div id="player-container" class="player-container hidden">
                    <div class="video-wrapper">
                        <div id="yt-player" class="hidden"></div>
                        
                        <iframe id="universal-player" class="hidden" allowfullscreen allow="autoplay; encrypted-media"></iframe>

                        <video id="raw-player" class="hidden" controls autoplay style="width:100%; height:100%; background:#000;"></video>
                    </div>
                    <div class="player-info">
                        <h4 id="current-track-title">Nenhuma mídia reproduzindo</h4>
                        <button id="btn-close-player" class="icon-btn"><i class="fas fa-times"></i></button>
                    </div>
                </div>

                <section id="mosaic-grid" class="mosaic-grid">
                    </section>
            </main>
        </div>
    </div>

    <div id="admin-modal" class="modal-overlay hidden">
        <div class="modal-content admin-box">
            <div class="modal-header">
                <h3>Painel de Controle (Firebase & YouTube API)</h3>
                <button id="btn-close-admin" class="icon-btn"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="admin-tabs">
                <button class="tab-btn active" data-tab="add-tab" id="tab-trigger-add">Adicionar Mídia</button>
                <button class="tab-btn" data-tab="channel-tab" id="tab-trigger-channel">Vincular Canal Dinâmico</button>
                <button class="tab-btn" data-tab="manage-tab" id="tab-trigger-manage">Editar / Excluir / Exportar</button>
            </div>

            <div id="add-tab" class="tab-content">
                <div class="form-group row">
                    <input type="text" id="manual-media-url" placeholder="Cole a URL do YouTube, Archive.org ou link direto .mp4/.mkv">
                    <button id="btn-fetch-manual" class="accent-btn" style="width: auto; white-space: nowrap; margin: 0;">Capturar Dados</button>
                </div>
                
                <div class="preview-box" id="yt-preview">
                    <img id="prev-thumb" src="https://placehold.co/120x90?text=Sem+Capa" alt="Miniatura">
                    <input type="text" id="prev-title" placeholder="Título da Mídia capturada">
                </div>
                <div class="form-group">
                    <input type="text" id="media-category" placeholder="Categoria (ex: Luiz do Som) - Digite Manualmente">
                    <input type="text" id="media-subcategory" placeholder="Subcategoria (ex: Saga de Luara) - Digite Manualmente">
                </div>
                <button id="btn-save-media" class="save-btn"><i class="fas fa-save"></i> Salvar no meu Firebase</button>
            </div>

            <div id="channel-tab" class="tab-content hidden">
                <div class="form-group row">
                    <input type="text" id="search-channel-input" placeholder="Digite o nome do canal do YouTube que quer buscar...">
                    <button id="btn-search-channel" class="accent-btn" style="width: auto; white-space: nowrap; margin: 0;"><i class="fas fa-search"></i> Buscar Canal</button>
                </div>

                <div class="preview-box" id="channel-preview" style="text-align: left; display: none;">
                    <img id="chan-thumb" src="https://placehold.co/80x80?text=Canal" alt="Avatar Canal" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover;">
                    <div style="flex: 1;">
                        <h4 id="chan-title-text" style="color: #fff; margin-bottom: 0.3rem;">Nenhum canal selecionado</h4>
                        <p id="chan-desc-text" style="font-size: 0.8rem; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;"></p>
                    </div>
                </div>

                <div class="form-group" style="text-align: left; margin-top: 1rem;">
                    <label style="font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 0.3rem;">Vincular à Categoria:</label>
                    <select id="channel-target-category" style="width: 100%; padding: 0.75rem; border-radius: 4px; background: #333; color: #fff; border: none; outline: none; margin: 0.5rem 0;">
                        </select>
                </div>
                <button id="btn-save-channel-link" class="save-btn" style="background: #8e44ad;"><i class="fas fa-link"></i> Ativar Subcategoria "Vídeos Recentes"</button>
            </div>

            <div id="manage-tab" class="tab-content hidden">
                <div class="backup-actions">
                    <button id="btn-export-json" class="btn-secondary"><i class="fas fa-download"></i> Exportar Tudo (JSON)</button>
                    <button id="btn-trigger-import" class="btn-secondary"><i class="fas fa-upload"></i> Importar Arquivo (JSON)</button>
                    <input type="file" id="import-json-file" accept=".json" class="hidden">
                </div>

                <div class="import-code-container" style="margin-top: 1rem; text-align: left;">
                    <label style="font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 0.3rem;">Ou cole o Código JSON abaixo:</label>
                    <textarea id="import-json-code" placeholder='Exemplo: {"capa":"...","categoria":"...","link":"...","subcategoria":"...","título":"..."}' style="width: 100%; height: 60px; background: #333; color: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 0.5rem; font-family: monospace; font-size: 0.8rem; resize: vertical; outline: none;"></textarea>
                    <button id="btn-process-code" class="btn-secondary" style="margin-top: 0.4rem; padding: 0.4rem 0.8rem; font-size: 0.85rem;"><i class="fas fa-code"></i> Processar Código JSON</button>
                </div>

                <div id="crud-tree-list" class="crud-list">
                    </div>
            </div>
        </div>
    </div>

    <div id="edit-media-modal" class="modal-overlay hidden" style="z-index: 100000;">
        <div class="modal-content" style="max-width: 500px; text-align: left;">
            <h3 style="margin-bottom: 1rem;"><i class="fas fa-edit text-red"></i> Editar Dados da Mídia</h3>
            <div class="form-group" style="margin-bottom: 0.5rem;">
                <label style="font-size: 0.85rem; color: var(--text-muted);">Título da Mídia:</label>
                <input type="text" id="edit-field-title">
            </div>
            <div class="form-group" style="margin-bottom: 0.5rem;">
                <label style="font-size: 0.85rem; color: var(--text-muted);">Link Incorporado (Embed) ou URL Direta:</label>
                <input type="text" id="edit-field-link">
            </div>
            <div class="form-group" style="margin-bottom: 0.5rem;">
                <label style="font-size: 0.85rem; color: var(--text-muted);">URL da Capa:</label>
                <input type="text" id="edit-field-capa">
            </div>
            <div class="form-group" style="margin-bottom: 0.5rem;">
                <label style="font-size: 0.85rem; color: var(--text-muted);">Categoria:</label>
                <input type="text" id="edit-field-category">
            </div>
            <div class="form-group" style="margin-bottom: 1rem;">
                <label style="font-size: 0.85rem; color: var(--text-muted);">Subcategoria:</label>
                <input type="text" id="edit-field-subcategory">
            </div>
            <div style="display: flex; gap: 0.5rem;">
                <button id="btn-submit-edit-media" style="background: #27ae60;"><i class="fas fa-check"></i> Salvar Alterações</button>
                <button id="btn-cancel-edit-media" style="background: #7f8c8d;"><i class="fas fa-times"></i> Cancelar</button>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="app.js"></script>
</body>
</html>
